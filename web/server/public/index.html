<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusLink - 打通内外网的桥梁</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      width: 420px;
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-icon { font-size: 48px; margin-bottom: 12px; display: block; }
    .login-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-subtitle { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 8px; }
    .login-btn {
      width: 100%; height: 48px; border-radius: 12px;
      font-size: 16px; font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none; margin-top: 24px; color: white; cursor: pointer;
    }
    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    #app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: rgba(15,12,41,0.8);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.1);
      position: fixed; top: 0; left: 0; height: 100vh;
    }
    .sidebar-logo {
      padding: 28px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-logo-text {
      font-size: 20px; font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-menu { padding: 16px 12px; }
    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-radius: 12px;
      cursor: pointer; color: rgba(255,255,255,0.7);
      margin-bottom: 4px; transition: all 0.3s;
    }
    .menu-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .menu-item.active {
      background: linear-gradient(135deg, rgba(102,126,234,0.3) 0%, rgba(118,75,162,0.3) 100%);
      color: #fff; border: 1px solid rgba(102,126,234,0.5);
    }
    .main-content { flex: 1; margin-left: 260px; padding: 24px 32px; }
    .page-header { margin-bottom: 24px; }
    .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .page-desc { color: rgba(255,255,255,0.6); font-size: 14px; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
    }
    .card-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .status-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 24px;
    }
    .status-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .status-card-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-badge.running { background: rgba(72,187,120,0.2); color: #48bb78; border: 1px solid rgba(72,187,120,0.3); }
    .status-badge.stopped { background: rgba(245,101,101,0.2); color: #f56565; border: 1px solid rgba(245,101,101,0.3); }
    .status-card-info { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.8; }
    .status-card-actions { margin-top: 16px; display: flex; gap: 8px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 20px; text-align: center;
    }
    .stat-icon { font-size: 32px; margin-bottom: 12px; }
    .stat-value {
      font-size: 24px; font-weight: 700; margin-bottom: 4px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .proxy-list { display: grid; gap: 12px; }
    .proxy-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .proxy-info { display: flex; align-items: center; gap: 16px; }
    .proxy-name { font-size: 16px; font-weight: 600; }
    .proxy-detail { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .proxy-type {
      padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      background: rgba(102,126,234,0.2); color: #a5b4fc;
    }
    .log-panel {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 16px;
      height: 400px; overflow-y: auto;
      font-family: monospace; font-size: 12px; line-height: 1.6;
    }
    .log-line { color: rgba(255,255,255,0.7); }
    .info-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
    .info-item {
      display: flex; justify-content: space-between;
      padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 10px;
    }
    .info-label { color: rgba(255,255,255,0.6); font-size: 14px; }
    .info-value { color: #fff; font-weight: 600; font-size: 14px; }
    .security-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-top: 16px; }
    .security-item {
      padding: 16px; background: rgba(72,187,120,0.1);
      border: 1px solid rgba(72,187,120,0.2); border-radius: 12px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .security-icon { font-size: 24px; flex-shrink: 0; }
    .security-text h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .security-text p { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.5; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .top-bar-right { display: flex; gap: 12px; align-items: center; }
    .user-info {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; background: rgba(255,255,255,0.08);
      border-radius: 10px; font-size: 13px; color: rgba(255,255,255,0.7);
    }
    .btn {
      padding: 8px 16px; border-radius: 10px; border: none;
      cursor: pointer; font-weight: 600; font-size: 14px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-success { background: rgba(72,187,120,0.2); border: 1px solid rgba(72,187,120,0.4); color: #48bb78; }
    .btn-success:hover { background: rgba(72,187,120,0.3); }
    .btn-danger { background: rgba(245,101,101,0.2); border: 1px solid rgba(245,101,101,0.4); color: #f56565; }
    .btn-danger:hover { background: rgba(245,101,101,0.3); }
    .btn-small { padding: 6px 12px; font-size: 12px; }
    .sidebar-footer {
      padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px; color: rgba(255,255,255,0.4);
      position: absolute; bottom: 0; left: 0; right: 0;
    }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; margin-bottom: 8px; color: rgba(255,255,255,0.8); font-size: 14px; }
    .form-input {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: #fff; font-size: 14px;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.3); }
    .form-input:focus { outline: none; border-color: rgba(102,126,234,0.5); }
    .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: rgba(30,27,75,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 24px; width: 500px;
    }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; }
    .log-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .log-tab {
      padding: 6px 16px; border-radius: 8px; cursor: pointer;
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6);
      font-size: 13px; transition: all 0.3s;
    }
    .log-tab.active { background: rgba(102,126,234,0.3); color: #fff; }
  </style>
</head>
<body>
  <div id="app">
    <!-- 登录页面 -->
    <div v-if="!isLoggedIn" class="login-container">
      <div class="login-box">
        <div class="login-logo">
          <span class="login-icon">🔗</span>
          <div class="login-title">NexusLink</div>
          <div class="login-subtitle">打通内外网的桥梁</div>
        </div>
        <div class="form-group">
          <input
            type="password"
            v-model="loginPassword"
            class="form-input"
            placeholder="请输入管理密码"
            @keyup.enter="handleLogin"
          />
        </div>
        <button class="login-btn" @click="handleLogin" :disabled="loginLoading">
          {{ loginLoading ? '登录中...' : '登 录' }}
        </button>
        <div style="text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.4);">
          v0.2.0.beta · C语言自主引擎
        </div>
      </div>
    </div>

    <!-- 主应用 -->
    <template v-else>
      <div class="sidebar">
        <div class="sidebar-logo">
          <span style="font-size: 32px;">🔗</span>
          <span class="sidebar-logo-text">NexusLink</span>
        </div>
        <div class="sidebar-menu">
          <div
            v-for="item in menuItems"
            :key="item.key"
            class="menu-item"
            :class="{ active: currentPage === item.key }"
            @click="currentPage = item.key"
          >
            <span style="font-size: 20px; width: 24px; text-align: center;">{{ item.icon }}</span>
            <span style="font-size: 14px; font-weight: 500;">{{ item.label }}</span>
          </div>
        </div>
        <div class="sidebar-footer">
          v0.2.0.beta<br>
          C语言自主引擎
        </div>
      </div>

      <div class="main-content">
        <div class="top-bar">
          <div class="page-header" style="margin-bottom: 0;">
            <h1 class="page-title">{{ pageInfo[currentPage]?.title }}</h1>
            <p class="page-desc">{{ pageInfo[currentPage]?.desc }}</p>
          </div>
          <div class="top-bar-right">
            <div class="user-info">
              <span>👤</span>
              <span>管理员</span>
            </div>
            <button class="btn btn-danger btn-small" @click="handleLogout">退出登录</button>
          </div>
        </div>

        <!-- 仪表盘 -->
        <div v-if="currentPage === 'dashboard'">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon">🚀</div>
              <div class="stat-value">{{ systemInfo.version || '-' }}</div>
              <div class="stat-label">当前版本</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📦</div>
              <div class="stat-value">{{ serverBinSize }}</div>
              <div class="stat-label">服务端体积</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📱</div>
              <div class="stat-value">{{ clientBinSize }}</div>
              <div class="stat-label">客户端体积</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">🔐</div>
              <div class="stat-value">HMAC-256</div>
              <div class="stat-label">安全认证</div>
            </div>
          </div>

          <div class="status-grid">
            <div class="status-card">
              <div class="status-card-header">
                <div class="status-card-title">
                  <span>🖥️</span>服务端
                </div>
                <span class="status-badge" :class="serverStatus.running ? 'running' : 'stopped'">
                  {{ serverStatus.running ? '运行中' : '已停止' }}
                </span>
              </div>
              <div class="status-card-info">
                <div v-if="serverStatus.running">
                  PID: {{ serverStatus.pid }}<br>
                  端口: {{ serverStatus.config?.bind_port || '-' }}
                </div>
                <div v-else>服务未启动</div>
              </div>
              <div class="status-card-actions">
                <button v-if="!serverStatus.running" class="btn btn-success btn-small" @click="startServer">
                  ▶ 启动
                </button>
                <button v-else class="btn btn-danger btn-small" @click="stopServer">
                  ■ 停止
                </button>
              </div>
            </div>

            <div class="status-card">
              <div class="status-card-header">
                <div class="status-card-title">
                  <span>📱</span>客户端
                </div>
                <span class="status-badge" :class="clientStatus.running ? 'running' : 'stopped'">
                  {{ clientStatus.running ? '运行中' : '已停止' }}
                </span>
              </div>
              <div class="status-card-info">
                <div v-if="clientStatus.running">
                  PID: {{ clientStatus.pid }}<br>
                  服务器: {{ clientStatus.config?.server_ip || '-' }}
                </div>
                <div v-else>服务未启动</div>
              </div>
              <div class="status-card-actions">
                <button v-if="!clientStatus.running" class="btn btn-success btn-small" @click="startClient">
                  ▶ 启动
                </button>
                <button v-else class="btn btn-danger btn-small" @click="stopClient">
                  ■ 停止
                </button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">
              <span>🔌</span>代理概览
            </div>
            <div class="proxy-list" v-if="Object.keys(proxies).length > 0">
              <div v-for="(proxy, name) in proxies" :key="name" class="proxy-item">
                <div class="proxy-info">
                  <div>
                    <div class="proxy-name">{{ name }}</div>
                    <div class="proxy-detail">
                      {{ proxy.localaddr }}:{{ proxy.localport }} → :{{ proxy.port }}
                    </div>
                  </div>
                  <span class="proxy-type">{{ proxy.type }}</span>
                </div>
              </div>
            </div>
            <div v-else class="empty-state">暂无代理配置</div>
          </div>
        </div>

        <!-- 服务端配置 -->
        <div v-if="currentPage === 'server-config'">
          <div class="card">
            <div class="card-title"><span>⚙️</span>服务端配置</div>
            <div class="form-group">
              <label class="form-label">绑定地址</label>
              <input v-model="serverConfig.bind_addr" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label">绑定端口</label>
              <input v-model.number="serverConfig.bind_port" type="number" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label">认证令牌</label>
              <input v-model="serverConfig.token" type="password" class="form-input" />
            </div>
            <button class="btn btn-primary" @click="saveServerConfig" :disabled="savingConfig">
              💾 {{ savingConfig ? '保存中...' : '保存配置' }}
            </button>
          </div>
        </div>

        <!-- 客户端配置 -->
        <div v-if="currentPage === 'client-config'">
          <div class="card">
            <div class="card-title"><span>⚙️</span>客户端配置</div>
            <div class="form-group">
              <label class="form-label">服务器地址</label>
              <input v-model="clientConfig.server_ip" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label">服务器端口</label>
              <input v-model.number="clientConfig.server_port" type="number" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label">认证令牌</label>
              <input v-model="clientConfig.token" type="password" class="form-input" />
            </div>
            <button class="btn btn-primary" @click="saveClientConfig" :disabled="savingConfig">
              💾 {{ savingConfig ? '保存中...' : '保存配置' }}
            </button>
          </div>
        </div>

        <!-- 代理管理 -->
        <div v-if="currentPage === 'proxies'">
          <div class="card">
            <div class="card-title" style="justify-content: space-between;">
              <span style="display: flex; align-items: center; gap: 8px;"><span>🔌</span>代理管理</span>
              <button class="btn btn-primary btn-small" @click="showAddProxy = true">➕ 添加代理</button>
            </div>
            <div class="proxy-list" v-if="Object.keys(proxies).length > 0">
              <div v-for="(proxy, name) in proxies" :key="name" class="proxy-item">
                <div class="proxy-info">
                  <div>
                    <div class="proxy-name">{{ name }}</div>
                    <div class="proxy-detail">
                      本地 {{ proxy.localaddr }}:{{ proxy.localport }} → 远程 :{{ proxy.port }}
                    </div>
                  </div>
                  <span class="proxy-type">{{ proxy.type }}</span>
                </div>
                <button class="btn btn-danger btn-small" @click="deleteProxy(name)">🗑️ 删除</button>
              </div>
            </div>
            <div v-else class="empty-state">暂无代理配置，点击右上角添加</div>
          </div>
        </div>

        <!-- 运行日志 -->
        <div v-if="currentPage === 'logs'">
          <div class="card">
            <div class="card-title" style="justify-content: space-between;">
              <span style="display: flex; align-items: center; gap: 8px;"><span>📋</span>运行日志</span>
              <div style="display: flex; gap: 8px;">
                <div class="log-tabs">
                  <div class="log-tab" :class="{active: logType === 'server'}" @click="logType = 'server'">服务端</div>
                  <div class="log-tab" :class="{active: logType === 'client'}" @click="logType = 'client'">客户端</div>
                </div>
                <button class="btn btn-danger btn-small" @click="clearLogs">清空</button>
              </div>
            </div>
            <div class="log-panel" ref="logPanel">
              <div v-for="(line, i) in currentLogs" :key="i" class="log-line">{{ line }}</div>
              <div v-if="currentLogs.length === 0" class="empty-state" style="padding: 20px;">暂无日志</div>
            </div>
          </div>
        </div>

        <!-- 系统信息 -->
        <div v-if="currentPage === 'system'">
          <div class="card">
            <div class="card-title"><span>ℹ️</span>系统信息</div>
            <div class="info-list">
              <div class="info-item">
                <span class="info-label">产品名称</span>
                <span class="info-value">{{ systemInfo.name || 'NexusLink' }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">当前版本</span>
                <span class="info-value">{{ systemInfo.version || '-' }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">产品描述</span>
                <span class="info-value">{{ systemInfo.description || '-' }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">服务端体积</span>
                <span class="info-value">{{ serverBinSize }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">客户端体积</span>
                <span class="info-value">{{ clientBinSize }}</span>
              </div>
              <div class="info-item">
                <span class="info-label">运行时间</span>
                <span class="info-value">{{ uptimeFormatted }}</span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title"><span>🔐</span>安全特性</div>
            <div class="security-features">
              <div class="security-item">
                <span class="security-icon">✅</span>
                <div class="security-text">
                  <h4>HMAC-SHA256 认证</h4>
                  <p>每数据包独立签名，防止篡改</p>
                </div>
              </div>
              <div class="security-item">
                <span class="security-icon">✅</span>
                <div class="security-text">
                  <h4>防重放攻击</h4>
                  <p>5分钟时间窗口验证</p>
                </div>
              </div>
              <div class="security-item">
                <span class="security-icon">✅</span>
                <div class="security-text">
                  <h4>恒时比较</h4>
                  <p>防止时序攻击</p>
                </div>
              </div>
              <div class="security-item">
                <span class="security-icon">✅</span>
                <div class="security-text">
                  <h4>低带宽损耗</h4>
                  <p>仅 2.8% 额外开销</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- 添加代理弹窗 -->
    <div v-if="showAddProxy" class="modal-overlay" @click.self="showAddProxy = false">
      <div class="modal">
        <div class="modal-title">添加代理</div>
        <div class="form-group">
          <label class="form-label">代理名称</label>
          <input v-model="newProxy.name" class="form-input" placeholder="如：minecraft" />
        </div>
        <div class="form-group">
          <label class="form-label">协议类型</label>
          <select v-model="newProxy.type" class="form-input">
            <option value="tcp">TCP</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">远程端口</label>
          <input v-model.number="newProxy.port" type="number" class="form-input" placeholder="服务端监听端口" />
        </div>
        <div class="form-group">
          <label class="form-label">本地地址</label>
          <input v-model="newProxy.localaddr" class="form-input" placeholder="127.0.0.1" />
        </div>
        <div class="form-group">
          <label class="form-label">本地端口</label>
          <input v-model.number="newProxy.localport" type="number" class="form-input" placeholder="本地服务端口" />
        </div>
        <div class="modal-footer">
          <button class="btn btn-danger btn-small" @click="showAddProxy = false">取消</button>
          <button class="btn btn-primary btn-small" @click="addProxy" :disabled="addingProxy">
            {{ addingProxy ? '添加中...' : '确定添加' }}
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, ref, reactive, computed, onMounted, onUnmounted, nextTick, watch } = Vue;

    createApp({
      setup() {
        const isLoggedIn = ref(false);
        const token = ref('');
        const loginPassword = ref('');
        const loginLoading = ref(false);

        const menuItems = [
          { key: 'dashboard', label: '仪表盘', icon: '📊' },
          { key: 'server-config', label: '服务端配置', icon: '🖥️' },
          { key: 'client-config', label: '客户端配置', icon: '📱' },
          { key: 'proxies', label: '代理管理', icon: '🔌' },
          { key: 'logs', label: '运行日志', icon: '📋' },
          { key: 'system', label: '系统信息', icon: 'ℹ️' }
        ];
        const currentPage = ref('dashboard');

        const pageInfo = {
          'dashboard': { title: '仪表盘', desc: 'NexusLink 服务状态总览' },
          'server-config': { title: '服务端配置', desc: '配置服务端监听参数' },
          'client-config': { title: '客户端配置', desc: '配置客户端连接参数' },
          'proxies': { title: '代理管理', desc: '管理端口转发代理' },
          'logs': { title: '运行日志', desc: '实时查看服务运行日志' },
          'system': { title: '系统信息', desc: '系统版本与安全特性' }
        };

        const systemInfo = ref({});
        const serverBinSize = computed(() => {
          const size = systemInfo.value.binaries?.server || 0;
          return (size / 1024).toFixed(1) + ' KB';
        });
        const clientBinSize = computed(() => {
          const size = systemInfo.value.binaries?.client || 0;
          return (size / 1024).toFixed(1) + ' KB';
        });
        const uptimeFormatted = computed(() => {
          const uptime = systemInfo.value.uptime || 0;
          const h = Math.floor(uptime / 3600);
          const m = Math.floor((uptime % 3600) / 60);
          const s = Math.floor(uptime % 60);
          if (h > 0) return h + '小时' + m + '分钟';
          if (m > 0) return m + '分' + s + '秒';
          return s + '秒';
        });

        const serverStatus = ref({ running: false, config: null });
        const clientStatus = ref({ running: false, config: null });

        const serverConfig = reactive({ bind_addr: '0.0.0.0', bind_port: 7000, token: '' });
        const clientConfig = reactive({ server_ip: '127.0.0.1', server_port: 7000, token: '' });
        const savingConfig = ref(false);

        const proxies = ref({});
        const showAddProxy = ref(false);
        const newProxy = reactive({ name: '', type: 'tcp', port: 8080, localaddr: '127.0.0.1', localport: 80 });
        const addingProxy = ref(false);

        const logType = ref('server');
        const serverLogs = ref([]);
        const clientLogs = ref([]);
        const logPanel = ref(null);
        const currentLogs = computed(() => logType.value === 'server' ? serverLogs.value : clientLogs.value);

        let ws = null;

        async function api(url, options = {}) {
          const headers = { 'Content-Type': 'application/json', ...options.headers };
          if (token.value) headers['Authorization'] = token.value;
          const res = await fetch(url, { ...options, headers });
          return res.json();
        }

        async function handleLogin() {
          if (!loginPassword.value) { alert('请输入密码'); return; }
          loginLoading.value = true;
          try {
            const res = await api('/api/login', {
              method: 'POST',
              body: JSON.stringify({ password: loginPassword.value })
            });
            if (res.success) {
              token.value = res.token;
              isLoggedIn.value = true;
              sessionStorage.setItem('nexuslink_token', res.token);
              loadData();
              connectWS();
            } else {
              alert(res.message || '密码错误');
            }
          } catch (e) {
            alert('登录失败');
          } finally {
            loginLoading.value = false;
          }
        }

        function handleLogout() {
          isLoggedIn.value = false;
          token.value = '';
          sessionStorage.removeItem('nexuslink_token');
          if (ws) { ws.close(); ws = null; }
        }

        async function loadData() {
          try {
            const results = await Promise.all([
              api('/api/system'),
              api('/api/status'),
              api('/api/config/server'),
              api('/api/config/client'),
              api('/api/proxies'),
              api('/api/logs/server'),
              api('/api/logs/client')
            ]);

            if (results[0].version) systemInfo.value = results[0];
            if (results[1].server) serverStatus.value = results[1].server;
            if (results[1].client) clientStatus.value = results[1].client;
            if (results[2].config) Object.assign(serverConfig, results[2].config);
            if (results[3].config) Object.assign(clientConfig, results[3].config);
            if (results[4].proxies) proxies.value = results[4].proxies;
            if (results[5].logs) serverLogs.value = results[5].logs;
            if (results[6].logs) clientLogs.value = results[6].logs;

            nextTick(() => { if (logPanel.value) logPanel.value.scrollTop = logPanel.value.scrollHeight; });
          } catch (e) { console.error(e); }
        }

        function connectWS() {
          const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          ws = new WebSocket(proto + '//' + location.host);
          ws.onmessage = (e) => {
            try {
              const d = JSON.parse(e.data);
              if (d.type === 'status') {
                if (d.server) serverStatus.value = d.server;
                if (d.client) clientStatus.value = d.client;
              } else if (d.type === 'log') {
                const arr = d.service === 'server' ? serverLogs : clientLogs;
                arr.value.push(d.line);
                if (arr.value.length > 500) arr.value.shift();
                nextTick(() => { if (logPanel.value) logPanel.value.scrollTop = logPanel.value.scrollHeight; });
              }
            } catch (e) {}
          };
          ws.onclose = () => setTimeout(connectWS, 3000);
        }

        async function startServer() {
          const res = await api('/api/server/start', { method: 'POST' });
          if (!res.success) alert(res.message || '启动失败');
        }
        async function stopServer() {
          const res = await api('/api/server/stop', { method: 'POST' });
          if (!res.success) alert(res.message || '停止失败');
        }
        async function startClient() {
          const res = await api('/api/client/start', { method: 'POST' });
          if (!res.success) alert(res.message || '启动失败');
        }
        async function stopClient() {
          const res = await api('/api/client/stop', { method: 'POST' });
          if (!res.success) alert(res.message || '停止失败');
        }

        async function saveServerConfig() {
          savingConfig.value = true;
          try {
            const res = await api('/api/config/server', { method: 'POST', body: JSON.stringify(serverConfig) });
            if (!res.success) alert(res.message || '保存失败');
            else alert('配置已保存');
          } finally { savingConfig.value = false; }
        }

        async function saveClientConfig() {
          savingConfig.value = true;
          try {
            const res = await api('/api/config/client', { method: 'POST', body: JSON.stringify(clientConfig) });
            if (!res.success) alert(res.message || '保存失败');
            else { alert('配置已保存'); loadData(); }
          } finally { savingConfig.value = false; }
        }

        async function addProxy() {
          if (!newProxy.name || !newProxy.port || !newProxy.localport) {
            alert('请填写完整信息'); return;
          }
          addingProxy.value = true;
          try {
            const res = await api('/api/proxies', { method: 'POST', body: JSON.stringify(newProxy) });
            if (res.success) {
              showAddProxy.value = false;
              newProxy.name = ''; newProxy.port = 8080; newProxy.localport = 80;
              loadData();
            } else {
              alert(res.message || '添加失败');
            }
          } finally { addingProxy.value = false; }
        }

        async function deleteProxy(name) {
          if (!confirm('确定删除代理 "' + name + '" 吗？')) return;
          const res = await api('/api/proxies/' + name, { method: 'DELETE' });
          if (res.success) loadData();
          else alert(res.message || '删除失败');
        }

        async function clearLogs() {
          const res = await api('/api/logs/' + logType.value, { method: 'DELETE' });
          if (res.success) {
            if (logType.value === 'server') serverLogs.value = [];
            else clientLogs.value = [];
          }
        }

        onMounted(() => {
          const t = sessionStorage.getItem('nexuslink_token');
          if (t) { token.value = t; isLoggedIn.value = true; loadData(); connectWS(); }
        });

        onUnmounted(() => { if (ws) ws.close(); });

        watch(logType, () => {
          nextTick(() => { if (logPanel.value) logPanel.value.scrollTop = logPanel.value.scrollHeight; });
        });

        return {
          isLoggedIn, loginPassword, loginLoading, handleLogin, handleLogout,
          menuItems, currentPage, pageInfo,
          systemInfo, serverBinSize, clientBinSize, uptimeFormatted,
          serverStatus, clientStatus, startServer, stopServer, startClient, stopClient,
          serverConfig, clientConfig, savingConfig, saveServerConfig, saveClientConfig,
          proxies, showAddProxy, newProxy, addingProxy, addProxy, deleteProxy,
          logType, currentLogs, logPanel, clearLogs
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
