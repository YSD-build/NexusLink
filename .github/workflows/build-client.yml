name: NexusLink еЃҐжИЈзЂѓзЉЦиѓС
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-client:
    name: зЉЦиѓСеЃҐжИЈзЂѓ ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: android-arm64
            goos: android
            goarch: arm64
          - name: android-armv7
            goos: android
            goarch: arm
            goarm: '7'
          - name: linux-x86_64
            goos: linux
            goarch: amd64
          - name: linux-armv8
            goos: linux
            goarch: arm64
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'
          - name: linux-armv6
            goos: linux
            goarch: arm
            goarm: '6'
          - name: windows-x86_64
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      - name: зЉЦиѓС
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BUILD_NAME="nexuslink-client-${VERSION}-${{ matrix.name }}.exe"
          else
            BUILD_NAME="nexuslink-client-${VERSION}-${{ matrix.name }}"
          fi
          go build -ldflags "-s -w" -o "dist/$BUILD_NAME" ./cmd/client
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.name }}
          path: dist/

  release:
    needs: build-client
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          append_body: true
