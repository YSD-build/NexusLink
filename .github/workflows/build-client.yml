name: NexusLink 客户端编译

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-client:
    name: 编译客户端 ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 版本
          - name: linux-x86_64
            goos: linux
            goarch: amd64
            goarm: ''

          - name: linux-armv8
            goos: linux
            goarch: arm64
            goarm: ''

          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: '7'

          - name: linux-armv6
            goos: linux
            goarch: arm
            goarm: '6'

          # Android 版本 (Termux 可用)
          - name: android-arm64
            goos: android
            goarch: arm64
            goarm: ''

          - name: android-armv7
            goos: android
            goarch: arm
            goarm: '7'

          # Windows 版本
          - name: windows-x86_64
            goos: windows
            goarch: amd64
            goarm: ''

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 下载依赖
        run: go mod tidy

      - name: 编译客户端
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          
          BUILD_NAME="nexuslink-client-${VERSION}-${{ matrix.name }}${EXT}"
          
          echo "编译客户端: $BUILD_NAME"
          go build -v -ldflags "-s -w -X main.Version=${VERSION}" -o "dist/$BUILD_NAME" ./cmd/client
          
          echo ""
          echo "编译完成:"
          ls -lh dist/
          file dist/* 2>/dev/null || true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.name }}
          path: dist/

  release:
    name: 发布 Client Release
    needs: build-client
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: 列出所有文件
        run: |
          echo "所有编译产物:"
          ls -lh dist/

      - name: 创建 GitHub Release (Client)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
          body: |
            # NexusLink 客户端 ${{ github.ref_name }}
            
            ## 下载说明
            
            ### 📱 Android (Termux)
            | 架构 | 文件名 | 适用设备 |
            |------|--------|----------|
            | ARM64 (ARMv8) | nexuslink-client-${{ github.ref_name }}-android-arm64 | 骁龙、天玑、绝大多数安卓手机 |
            | ARMv7 | nexuslink-client-${{ github.ref_name }}-android-armv7 | 旧版安卓设备 |
            
            ### 🐧 Linux
            | 架构 | 文件名 | 适用设备 |
            |------|--------|----------|
            | x86_64 | nexuslink-client-${{ github.ref_name }}-linux-x86_64 | PC、虚拟机 |
            | ARMv8 | nexuslink-client-${{ github.ref_name }}-linux-armv8 | ARM服务器、树莓派4/5 |
            | ARMv7 | nexuslink-client-${{ github.ref_name }}-linux-armv7 | 路由器、树莓派2/3 |
            | ARMv6 | nexuslink-client-${{ github.ref_name }}-linux-armv6 | 旧嵌入式设备 |
            
            ### 🪟 Windows
            | 架构 | 文件名 | 适用设备 |
            |------|--------|----------|
            | x86_64 | nexuslink-client-${{ github.ref_name }}-windows-x86_64.exe | Windows PC |
            
            ## Android 使用方法 (Termux)
            
            1. 安装 Termux: https://f-droid.org/packages/com.termux/
            2. 下载对应架构的二进制文件
            3. 在 Termux 中运行:
            ```bash
            chmod +x nexuslink-client-android-arm64
            ./nexuslink-client-android-arm64 -c client.yaml
            ```
            
            ## 配置文件示例 client.yaml
            
            ```yaml
            server_addr: 你的服务器IP
            server_port: 7000
            token: 你的密钥
            
            proxies:
              minecraft:
                type: tcp
                remote_port: 25565
                local_addr: 127.0.0.1
                local_port: 25565
            ```
          draft: false
          prerelease: false
