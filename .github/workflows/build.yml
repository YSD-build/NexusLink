name: NexusLink 多平台自动化编译

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: 编译 ${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.optimization }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (标准)
          - goos: linux
            goarch: amd64
            goarm: ''
            optimization: ''
            cc: ''
            cflags: ''
            name: linux-x86_64

          # Linux ARMv7 (32位)
          - goos: linux
            goarch: arm
            goarm: '7'
            optimization: ''
            cc: 'arm-linux-gnueabihf-gcc'
            cflags: '-march=armv7-a -mfpu=neon -mfloat-abi=hard'
            name: linux-armv7

          # Linux ARMv8 / ARM64 (64位)
          - goos: linux
            goarch: arm64
            goarm: ''
            optimization: ''
            cc: 'aarch64-linux-gnu-gcc'
            cflags: '-march=armv8-a+crc+crypto'
            name: linux-armv8

          # Linux ARM (通用32位)
          - goos: linux
            goarch: arm
            goarm: '6'
            optimization: ''
            cc: 'arm-linux-gnueabi-gcc'
            cflags: ''
            name: linux-arm

          # 骁龙特级优化 (Snapdragon 8 Gen 系列)
          - goos: linux
            goarch: arm64
            goarm: ''
            optimization: '-snapdragon'
            cc: 'aarch64-linux-gnu-gcc'
            cflags: '-march=armv8.2-a+crypto+dotprod -mcpu=cortex-a76 -O3 -ffast-math'
            name: linux-arm64-snapdragon

          # 天玑特级优化 (MediaTek Dimensity 系列)
          - goos: linux
            goarch: arm64
            goarm: ''
            optimization: '-dimensity'
            cc: 'aarch64-linux-gnu-gcc'
            cflags: '-march=armv8.2-a+crypto+dotprod -mcpu=cortex-a78 -O3 -ffast-math'
            name: linux-arm64-dimensity

          # Windows x86_64
          - goos: windows
            goarch: amd64
            goarm: ''
            optimization: ''
            cc: 'x86_64-w64-mingw32-gcc'
            cflags: ''
            name: windows-x86_64

          # Windows ARM64
          - goos: windows
            goarch: arm64
            goarm: ''
            optimization: ''
            cc: 'aarch64-w64-mingw32-gcc'
            cflags: ''
            name: windows-arm64

          # Android ARM64
          - goos: android
            goarch: arm64
            goarm: ''
            optimization: ''
            cc: 'aarch64-linux-android21-clang'
            cflags: ''
            name: android-arm64

          # Android ARMv7
          - goos: android
            goarch: arm
            goarm: '7'
            optimization: ''
            cc: 'armv7a-linux-androideabi21-clang'
            cflags: ''
            name: android-armv7

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: 安装交叉编译工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
          sudo apt-get install -y mingw-w64
          sudo apt-get install -y clang llvm

      - name: 安装 Android NDK
        if: matrix.goos == 'android'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25b" >> $GITHUB_ENV
          echo "PATH=$PWD/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

      - name: 编译 NexusLink
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
          CGO_CFLAGS: ${{ matrix.cflags }}
          CGO_ENABLED: '0'
        run: |
          BUILD_NAME="nexuslink-${{ matrix.name }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BUILD_NAME="${BUILD_NAME}.exe"
          fi
          
          echo "编译: $BUILD_NAME"
          echo "GOOS=$GOOS GOARCH=$GOARCH GOARM=$GOARM"
          echo "CC=$CC"
          echo "CFLAGS=$CGO_CFLAGS"
          
          go build -v -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME:-dev} -X main.Commit=$(git rev-parse --short HEAD)" \
            -o "dist/$BUILD_NAME" \
            ./cmd/server
          
          ls -lh dist/

      - name: 生成 SHA256 校验和
        run: |
          cd dist
          for file in *; do
            sha256sum "$file" >> sha256sums.txt
          done
          cat sha256sums.txt

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nexuslink-${{ matrix.name }}
          path: dist/
          retention-days: 30

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: 列出所有文件
        run: ls -lh dist/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
