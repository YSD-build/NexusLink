name: NexusLink 服务器通用版本编译

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 编译 ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            goarch: amd64
            goarm: ''

          - name: linux-arm64
            goarch: arm64
            goarm: ''

          - name: linux-armv7
            goarch: arm
            goarm: '7'

          - name: linux-arm
            goarch: arm
            goarm: '6'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 下载依赖
        run: go mod tidy

      - name: 编译 NexusLink
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          BUILD_NAME="nexuslink-${{ matrix.name }}"
          
          echo "编译: $BUILD_NAME"
          go build -v -ldflags "-s -w" -o "dist/$BUILD_NAME" ./cmd/server
          
          echo ""
          echo "编译完成:"
          ls -lh dist/
          file dist/*

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: 列出所有文件
        run: |
          echo "所有编译产物:"
          ls -lh dist/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
