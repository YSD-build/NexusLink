name: NexusLink Build
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: linux-x86_64, goarch: amd64 }
          - { name: linux-armv8, goarch: arm64 }
          - { name: linux-armv7, goarch: arm, goarm: '7' }
          - { name: linux-armv6, goarch: arm, goarm: '6' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go mod tidy
      - run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} CGO_ENABLED=0 \
          go build -ldflags "-s -w" -o dist/nexuslink-server-${GITHUB_REF_NAME}-${{ matrix.name }} ./cmd/server
      - uses: actions/upload-artifact@v4
        with: { name: server-${{ matrix.name }}, path: dist/ }

  build-client:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: android-arm64, goos: android, goarch: arm64 }
          - { name: android-armv7, goos: android, goarch: arm, goarm: '7' }
          - { name: linux-x86_64, goos: linux, goarch: amd64 }
          - { name: linux-armv8, goos: linux, goarch: arm64 }
          - { name: linux-armv7, goos: linux, goarch: arm, goarm: '7' }
          - { name: linux-armv6, goos: linux, goarch: arm, goarm: '6' }
          - { name: windows-x86_64, goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go mod tidy
      - run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=.exe
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} CGO_ENABLED=0 \
          go build -ldflags "-s -w" -o dist/nexuslink-client-${GITHUB_REF_NAME}-${{ matrix.name }}$EXT ./cmd/client
      - uses: actions/upload-artifact@v4
        with: { name: client-${{ matrix.name }}, path: dist/ }

  release:
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - run: ls -lh dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
