name: NexusLink 服务器通用版本编译

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: 编译 ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 服务器通用版
          - os: linux
            arch: amd64
            goarch: amd64
            name: linux-x86_64

          # Linux ARM64 服务器通用版 (ARMv8)
          - os: linux
            arch: arm64
            goarch: arm64
            name: linux-arm64

          # Linux ARMv7 通用版 (路由器/嵌入式)
          - os: linux
            arch: armv7
            goarch: arm
            goarm: '7'
            name: linux-armv7

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: 编译 NexusLink
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          BUILD_NAME="nexuslink-${{ matrix.name }}"
          
          echo "========================================"
          echo "编译: $BUILD_NAME"
          echo "GOOS=$GOOS GOARCH=$GOARCH GOARM=$GOARM"
          echo "========================================"
          
          mkdir -p dist
          
          go build -v -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME:-dev} -X main.Commit=$(git rev-parse --short HEAD)" \
            -o "dist/$BUILD_NAME" \
            ./cmd/server
          
          echo ""
          echo "编译完成，文件信息:"
          ls -lh dist/
          file dist/*

      - name: 生成 SHA256 校验和
        run: |
          cd dist
          for file in *; do
            sha256sum "$file" >> sha256sums.txt
          done
          echo "校验和:"
          cat sha256sums.txt

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nexuslink-${{ matrix.name }}
          path: dist/
          retention-days: 90

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: 列出所有文件
        run: |
          echo "所有编译产物:"
          ls -lh dist/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
