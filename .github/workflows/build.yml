name: NexusLink Build
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go mod tidy
      - run: |
          mkdir -p dist
          
          # 服务端 4个
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-server-${GITHUB_REF_NAME}-linux-x86_64 ./cmd/server
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-server-${GITHUB_REF_NAME}-linux-armv8 ./cmd/server
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-server-${GITHUB_REF_NAME}-linux-armv7 ./cmd/server
          GOOS=linux GOARCH=arm GOARM=6 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-server-${GITHUB_REF_NAME}-linux-armv6 ./cmd/server
          
          # 客户端 6个（去掉android-armv7，需要cgo）
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-client-${GITHUB_REF_NAME}-android-arm64 ./cmd/client
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-client-${GITHUB_REF_NAME}-linux-x86_64 ./cmd/client
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-client-${GITHUB_REF_NAME}-linux-armv8 ./cmd/client
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-client-${GITHUB_REF_NAME}-linux-armv7 ./cmd/client
          GOOS=linux GOARCH=arm GOARM=6 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-client-${GITHUB_REF_NAME}-linux-armv6 ./cmd/client
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=${GITHUB_REF_NAME}" -o dist/nexuslink-client-${GITHUB_REF_NAME}-windows-x86_64.exe ./cmd/client
          
          ls -lh dist/
          
          # 打包 Web 管理面板
          mkdir -p dist/web-panel/bin
          mkdir -p dist/web-panel/config
          cp -r web/server dist/web-panel/
          cp web/start.sh dist/web-panel/
          cp web/config/* dist/web-panel/config/ 2>/dev/null || true
          # 放入 x86_64 版本的二进制作为默认
          cp dist/nexuslink-server-${GITHUB_REF_NAME}-linux-x86_64 dist/web-panel/bin/nexuslink-server
          cp dist/nexuslink-client-${GITHUB_REF_NAME}-linux-x86_64 dist/web-panel/bin/nexuslink-client
          chmod +x dist/web-panel/bin/*
          cd dist && zip -r nexuslink-web-panel-${GITHUB_REF_NAME}.zip web-panel/ && cd ..
          rm -rf dist/web-panel
          
          ls -lh dist/
      - name: 生成更新日志
        run: |
          cat > release_body.md << 'EOF'
          # 🚀 NexusLink ${{ github.ref_name }} 正式发布
          
          ## 📦 统一版本 - 服务端 + 客户端
          
          ### ✅ 服务端 (4个架构)
          | 架构 | 文件名 | 适用设备 |
          |------|--------|----------|
          | Linux x86_64 | nexuslink-server-${{ github.ref_name }}-linux-x86_64 | 云服务器、PC、虚拟机 |
          | Linux ARMv8 | nexuslink-server-${{ github.ref_name }}-linux-armv8 | ✅ ARM服务器、树莓派4/5 |
          | Linux ARMv7 | nexuslink-server-${{ github.ref_name }}-linux-armv7 | 路由器、树莓派2/3 |
          | Linux ARMv6 | nexuslink-server-${{ github.ref_name }}-linux-armv6 | 旧嵌入式设备 |
          
          ### ✅ 客户端 (6个版本)
          | 架构 | 文件名 | 适用设备 |
          |------|--------|----------|
          | ✅ Android ARM64 | nexuslink-client-${{ github.ref_name }}-android-arm64 | 骁龙、天玑、绝大多数安卓手机（Termux无Root） |
          | Linux x86_64 | nexuslink-client-${{ github.ref_name }}-linux-x86_64 | PC、虚拟机 |
          | Linux ARMv8 | nexuslink-client-${{ github.ref_name }}-linux-armv8 | ARM服务器、树莓派 |
          | Linux ARMv7 | nexuslink-client-${{ github.ref_name }}-linux-armv7 | 路由器 |
          | Linux ARMv6 | nexuslink-client-${{ github.ref_name }}-linux-armv6 | 旧嵌入式设备 |
          | Windows x64 | nexuslink-client-${{ github.ref_name }}-windows-x86_64.exe | Windows PC |
          
          ## 🔐 安全特性
          - ✅ HMAC-SHA256 每数据包独立认证
          - ✅ 防重放攻击（5分钟时间窗口）
          - ✅ 恒时比较防止时序攻击
          - ✅ 带宽损耗仅 2.8%
          
          ## 🚀 快速开始
          ### 服务端
          \`\`\`bash
          chmod +x nexuslink-server-*
          ./nexuslink-server-* -c server.yaml
          \`\`\`
          
          ### 客户端 (Android Termux)
          \`\`\`bash
          chmod +x nexuslink-client-android-arm64
          ./nexuslink-client-android-arm64 -c client.yaml
          \`\`\`
          
          ## ✨ 新特性：内置 Web 管理面板
          
          **服务端已内置 Web 管理面板，无需单独部署！**
          
          **功能特性：**
          - ✅ 简约白色设计，干净整洁
          - ✅ 密码登录认证，保护管理界面
          - ✅ 概览页面：服务状态、客户端连接、代理数量统计
          - ✅ 代理管理：完整代理列表展示
          - ✅ 运行日志：实时查看服务日志
          - ✅ 安全机制：SHA256密码哈希、Token认证、安全响应头
          
          **启用方式：**
          在 server.yaml 中添加配置：
          \`\`\`yaml
          web_enable: true
          web_addr: 127.0.0.1
          web_port: 7001
          web_password: your_password
          \`\`\`
          
          启动服务端后访问 http://127.0.0.1:7001
          
          ## 🎛️ 独立 Web 管理面板 (可选)
          | 文件 | 说明 |
          |------|------|
          | nexuslink-web-panel-${{ github.ref_name }}.zip | 独立Node.js版Web管理面板（含x86_64二进制） |
          
          **快速启动：**
          \`\`\`bash
          unzip nexuslink-web-panel-${{ github.ref_name }}.zip
          cd web-panel
          ./start.sh
          # 访问 http://localhost:9527
          # 默认密码：admin123
          \`\`\`
          
          ## ⚠️ 说明
          - 去掉了 Android ARMv7（32位），需要cgo不支持纯静态编译
          - 99%的现代安卓手机都是ARM64，不影响使用
          - Web面板默认内置x86_64版本二进制，其他架构请自行替换 bin/ 目录下的文件
          EOF
          echo "✅ 更新日志已生成"
          cat release_body.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          body_path: release_body.md
