name: NexusLink Build
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      
      - name: 编译所有版本
        run: |
          VERSION=${GITHUB_REF_NAME}
          
          # 服务端 4个
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-server-${VERSION}-linux-x86_64 ./cmd/server
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-server-${VERSION}-linux-armv8 ./cmd/server
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-server-${VERSION}-linux-armv7 ./cmd/server
          GOOS=linux GOARCH=arm GOARM=6 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-server-${VERSION}-linux-armv6 ./cmd/server
          
          # 客户端 7个
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-client-${VERSION}-android-arm64 ./cmd/client
          GOOS=android GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-client-${VERSION}-android-armv7 ./cmd/client
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-client-${VERSION}-linux-x86_64 ./cmd/client
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-client-${VERSION}-linux-armv8 ./cmd/client
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-client-${VERSION}-linux-armv7 ./cmd/client
          GOOS=linux GOARCH=arm GOARM=6 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-client-${VERSION}-linux-armv6 ./cmd/client
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/nexuslink-client-${VERSION}-windows-x86_64.exe ./cmd/client
          
          ls -lh dist/
      
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
