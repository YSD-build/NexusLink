name: NexusLink 服务端编译

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-server:
    name: 编译服务端 ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: contains(github.ref, '.server')    # 只在tag包含.server时运行
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            goarch: amd64
            goarm: ''

          - name: linux-armv8
            goarch: arm64
            goarm: ''

          - name: linux-armv7
            goarch: arm
            goarm: '7'

          - name: linux-armv6
            goarch: arm
            goarm: '6'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 下载依赖
        run: go mod tidy

      - name: 编译服务端
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          BUILD_NAME="nexuslink-server-${VERSION}-${{ matrix.name }}"
          
          echo "编译服务端: $BUILD_NAME"
          go build -v -ldflags "-s -w -X main.Version=${VERSION}" -o "dist/$BUILD_NAME" ./cmd/server
          
          echo ""
          echo "编译完成:"
          ls -lh dist/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.name }}
          path: dist/

  release:
    name: 发布 Server Release
    needs: build-server
    runs-on: ubuntu-latest
    if: contains(github.ref, '.server')    # 只在tag包含.server时运行
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: 列出所有文件
        run: |
          echo "所有编译产物:"
          ls -lh dist/

      - name: 创建 GitHub Release (Server)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
          body: |
            # NexusLink 服务端 ${{ github.ref_name }}
            
            ## 下载说明
            
            | 架构 | 文件名 | 适用设备 |
            |------|--------|----------|
            | x86_64 | nexuslink-server-${{ github.ref_name }}-linux-x86_64 | 云服务器、PC、虚拟机 |
            | ARMv8 (ARM64) | nexuslink-server-${{ github.ref_name }}-linux-armv8 | ✅ ARM服务器、树莓派4/5 |
            | ARMv7 | nexuslink-server-${{ github.ref_name }}-linux-armv7 | 路由器、树莓派2/3 |
            | ARMv6 | nexuslink-server-${{ github.ref_name }}-linux-armv6 | 旧嵌入式设备 |
            
            ## 使用方法
            
            ### server.yaml
            ```yaml
            bind_addr: 0.0.0.0
            bind_port: 7000
            token: 你的密钥
            ```
            
            ### 运行
            ```bash
            chmod +x nexuslink-server-*
            ./nexuslink-server-* -c server.yaml
            ```
          draft: false
          prerelease: false
