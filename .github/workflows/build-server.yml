name: NexusLink 服务端编译
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-server:
    name: 编译服务端 ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            goarch: amd64
          - name: linux-armv8
            goarch: arm64
          - name: linux-armv7
            goarch: arm
            goarm: '7'
          - name: linux-armv6
            goarch: arm
            goarm: '6'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      - name: 编译
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          BUILD_NAME="nexuslink-server-${VERSION}-${{ matrix.name }}"
          go build -ldflags "-s -w" -o "dist/$BUILD_NAME" ./cmd/server
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.name }}
          path: dist/

  release:
    needs: build-server
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          append_body: true
